<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="emerald-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#065f46" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#emerald-gradient)" filter="url(#shadow)"/>
  
  <!-- Decorative inner ring -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3"/>
  
  <!-- Wheat/grain decorative elements -->
  <!-- Left wheat stalk -->
  <path d="M35 45 Q38 40 40 45 Q42 40 44 45 Q46 40 48 45" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="40" y1="45" x2="40" y2="65" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Right wheat stalk -->
  <path d="M72 45 Q74 40 76 45 Q78 40 80 45 Q82 40 84 45" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="78" y1="45" x2="78" y2="65" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Persian text "برکت" -->
  <text x="60" y="80" font-family="Vazirmatn, Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle" direction="rtl" unicode-bidi="bidi-override">برکت</text>
  
  <!-- Subtle shine effect -->
  <ellipse cx="45" cy="35" rx="20" ry="8" fill="#ffffff" opacity="0.1" transform="rotate(-30 45 35)"/>
</svg>