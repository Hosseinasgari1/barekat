<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="emerald-h" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Icon circle -->
  <circle cx="30" cy="30" r="25" fill="url(#emerald-h)"/>
  
  <!-- Persian letter in circle -->
  <text x="30" y="38" font-family="Vazirmatn, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">ب</text>
  
  <!-- Brand name in Persian -->
  <text x="130" y="42" font-family="Vazirmatn, Arial, sans-serif" font-size="32" font-weight="700" fill="#10b981" text-anchor="middle" direction="rtl">برکت</text>
  
  <!-- Tagline -->
  <text x="130" y="55" font-family="Vazirmatn, Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle" direction="rtl">غذای اضافی، قیمت مناسب</text>
</svg>