services:
  # 1. Backend Web Service (includes Gunicorn and Celery worker running in background)
  - type: web
    name: barekat-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: celery -A core worker --loglevel=info --concurrency=2 & gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: barekat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: barekat-redis
          property: connectionString

  # 2. Redis Instance (for caching and Celery broker)
  - type: redis
    name: barekat-redis
    ipAllowList: [] # Allow any internal connection

databases:
  # 3. PostgreSQL Database
  - name: barekat-db
    ipAllowList: [] # Allow any connection
